<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koilabhar Jungle Resort</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
padding:10px;
text-align:center;
font-weight:bold;
z-index:1000;
}

/* MAIN */
.container{
display:flex;
justify-content:center;
margin-top:70px;
}

.card{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:25px;
padding:20px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

/* LOGO */
.logo{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #00ffcc;
object-fit:cover;
margin-top:-70px;
}

/* BUTTON */
.btn{
display:block;
margin:8px 0;
padding:12px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
background:linear-gradient(45deg,#00ffcc,#00ccff);
color:black;
}

/* SOCIAL ICONS */
.social{
display:flex;
justify-content:space-around;
margin:15px 0;
}

.social img{
width:40px;
height:40px;
}

/* INPUT */
input,textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:none;
}

/* FOOTER */
.footer{
text-align:center;
padding:15px;
font-size:12px;
opacity:0.7;
}

/* MAP */
iframe{
width:100%;
border-radius:10px;
margin-top:10px;
}

/* MOBILE */
@media(max-width:500px){
.card{
padding:15px;
}
}
</style>
</head>

<body>

<div class="navbar">
🌿 Koilabhar Jungle Resort
</div>

<div class="container">
<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" class="logo">

<h2>Koilabhar Jungle Resort</h2>
<p>🌿 Experience the Loveliness of Terai 🌿</p>

<!-- SOCIAL ICONS -->
<div class="social">
<a href="https://wa.me/9779705026021">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<a href="https://www.facebook.com/sunil.patel.409609">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</a>

<a href="https://www.instagram.com/sunilpatel9943">
<img src="https://cdn-icons-png.flaticon.com/512/733/733558.png">
</a>

<a href="https://www.tiktok.com/@koilavar_jungle_resort">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
</a>
</div>

<!-- BUTTONS -->
<a href="tel:+9779705026021" class="btn">📞 Call Now</a>
<a href="https://wa.me/9779705026021" class="btn">💬 WhatsApp</a>

<button class="btn" onclick="saveContact()">💾 Add to Contact</button>

<a href="https://www.google.com/search?q=Koilabhar+Jungle+Resort" class="btn">
⭐ Review us on Google
</a>

<!-- QR -->
<div id="qrcode"></div>

<!-- BOOK -->
<h3>Book Now</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="msg" placeholder="Message"></textarea>
<button class="btn" onclick="book()">Submit</button>

<!-- MAP -->
<iframe src="https://maps.app.goo.gl/Hvdb4AuTRr5nkRuVA"></iframe>

</div>
</div>

<div class="footer">
© 2026 Koilabhar Jungle Resort | All Rights Reserved
</div>

<script>
QRCode.toCanvas(document.getElementById('qrcode'), window.location.href);

function saveContact(){
let vcf=`BEGIN:VCARD
VERSION:3.0
FN:Koilabhar Jungle Resort
TEL:+9779705026021
END:VCARD`;

let blob=new Blob([vcf],{type:'text/vcard'});
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download="contact.vcf";
a.click();
}

function book(){
alert("Booking feature connected to Firebase (add config)");
}
</script>

</body>
</html>
